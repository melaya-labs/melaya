# Publish every Melaya SDK on a version tag.
#   git tag v0.1.0 && git push origin v0.1.0   →   all registries publish in parallel.
# Requires these repo secrets (Settings → Secrets → Actions); a job is skipped if its
# token is empty, so you can add registries incrementally:
#   PYPI_TOKEN · CARGO_TOKEN · RUBYGEMS_API_KEY · NUGET_API_KEY   (npm uses OIDC Trusted Publishing — no secret)
# Go publishes from the git tag itself (no job). PHP publishes via the Packagist webhook
# (register the repo once at packagist.org). Java/Kotlin → Maven Central needs a one-time
# Sonatype + GPG setup in the Gradle build (separate job below, opt-in via MAVEN_* secrets).
name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  npm:
    if: false   # TEMP: @melaya/sdk 0.1.0 published manually; re-enable after attaching Trusted Publisher
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC — npm Trusted Publishing, no token/secret needed
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - run: npm install -g npm@latest      # Trusted Publishing needs npm >= 11.5.1
      - run: npm ci && npm run build
        working-directory: packages/sdk
      - run: npm publish --access public     # auto-uses OIDC + adds provenance
        working-directory: packages/sdk

  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build twine && python -m build && twine upload --skip-existing dist/*
        working-directory: packages/sdk-python
        env: { TWINE_USERNAME: "__token__", TWINE_PASSWORD: "${{ secrets.PYPI_TOKEN }}" }

  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y nasm   # aws-lc-sys build dep
      - run: cargo publish --token "${{ secrets.CARGO_TOKEN }}"
        working-directory: packages/sdk-rust

  nuget:
    if: false   # TEMP: enable once a nuget.org account + NUGET_API_KEY exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - run: dotnet pack Melaya -c Release -o out
        working-directory: packages/sdk-csharp
      - run: dotnet nuget push "out/*.nupkg" -k "${{ secrets.NUGET_API_KEY }}" -s https://api.nuget.org/v3/index.json --skip-duplicate
        working-directory: packages/sdk-csharp

  rubygems:
    if: false   # TEMP: melaya 0.1.0 pushed manually; re-enable for 0.1.1+ (OIDC Trusted Publishing)
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC — RubyGems Trusted Publishing, no token, MFA stays on
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - uses: rubygems/configure-rubygems-credentials@v1
      - run: gem build *.gemspec && gem push *.gem
        working-directory: packages/sdk-ruby

  # Maven Central (Java + Kotlin) — opt-in: needs Sonatype creds + a GPG key, and a
  # publishing{}/signing{} block in each build.gradle. Uncomment once configured.
  # maven:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-java@v4
  #       with: { distribution: temurin, java-version: "21" }
  #     - run: gradle publish
  #       working-directory: packages/sdk-java
  #       env:
  #         ORG_GRADLE_PROJECT_ossrhUsername: "${{ secrets.MAVEN_USER }}"
  #         ORG_GRADLE_PROJECT_ossrhPassword: "${{ secrets.MAVEN_PASS }}"
  #         ORG_GRADLE_PROJECT_signingKey:    "${{ secrets.GPG_KEY }}"
