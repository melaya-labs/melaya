# Publish every Melaya SDK on one version tag:
#   git tag v0.1.1 && git push origin v0.1.1   →   npm, PyPI, crates, RubyGems, and Maven Central
#   (Java + Kotlin) all publish in parallel. Go publishes from the tag itself (no job).
# NOTE: a Maven Central release is IMMUTABLE — the version you tag is final, no re-runs.
# NuGet uses Trusted Publishing (OIDC) — set the NUGET_USER secret to your nuget.org username.
# PHP/Packagist publishes from the repo-root composer.json (autoload -> packages/sdk-php/src) on each
# tag; .gitattributes export-ignore keeps the download PHP-only. Submit the repo to Packagist once.
# Secrets (Settings → Secrets → Actions): PYPI_TOKEN · CARGO_TOKEN · CENTRAL_USERNAME ·
# CENTRAL_PASSWORD · GPG_PRIVATE_KEY · GPG_PASSPHRASE  (npm + RubyGems use OIDC, no secret).
name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC — npm Trusted Publishing, no token/secret needed
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      - run: npm install -g npm@latest      # Trusted Publishing needs npm >= 11.5.1
      - run: npm ci && npm run build
        working-directory: packages/sdk
      - run: npm publish --access public     # auto-uses OIDC + adds provenance
        working-directory: packages/sdk

  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build twine && python -m build && twine upload --skip-existing dist/*
        working-directory: packages/sdk-python
        env: { TWINE_USERNAME: "__token__", TWINE_PASSWORD: "${{ secrets.PYPI_TOKEN }}" }

  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y nasm   # aws-lc-sys build dep
      - run: cargo publish --allow-dirty
        working-directory: packages/sdk-rust
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_TOKEN }}" }

  nuget:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC — NuGet Trusted Publishing (no stored API key)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "10.0.x" }     # csproj targets net10.0
      - uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}      # your nuget.org username (not email)
      - run: dotnet pack Melaya -c Release -o out
        working-directory: packages/sdk-csharp
      - run: dotnet nuget push "out/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
        working-directory: packages/sdk-csharp

  rubygems:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC — RubyGems Trusted Publishing; uses your publisher policy, bypasses MFA
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3" }
      - uses: rubygems/configure-rubygems-credentials@v2.1.0   # OIDC -> short-lived credentials
      - run: |
          rm -f *.gem               # drop any stale gem so the push glob hits only the fresh build
          gem build *.gemspec
          gem push *.gem
        working-directory: packages/sdk-ruby

  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - name: Publish Java SDK to Maven Central
        run: gradle publishToMavenCentral --no-configuration-cache -PmavenCentralAutomaticPublishing=true
        working-directory: packages/sdk-java
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: "${{ secrets.CENTRAL_USERNAME }}"
          ORG_GRADLE_PROJECT_mavenCentralPassword: "${{ secrets.CENTRAL_PASSWORD }}"
          ORG_GRADLE_PROJECT_signingInMemoryKey: "${{ secrets.GPG_PRIVATE_KEY }}"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: "${{ secrets.GPG_PASSPHRASE }}"
      - name: Publish Kotlin SDK to Maven Central
        run: gradle publishToMavenCentral --no-configuration-cache -PmavenCentralAutomaticPublishing=true
        working-directory: packages/sdk-kotlin
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: "${{ secrets.CENTRAL_USERNAME }}"
          ORG_GRADLE_PROJECT_mavenCentralPassword: "${{ secrets.CENTRAL_PASSWORD }}"
          ORG_GRADLE_PROJECT_signingInMemoryKey: "${{ secrets.GPG_PRIVATE_KEY }}"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: "${{ secrets.GPG_PASSPHRASE }}"

  go-tag:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push the Go submodule tag back to this repo
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Tag the Go module (subdir modules need a path-prefixed tag)
        run: |
          V="${GITHUB_REF_NAME}"                 # vX.Y.Z
          TAG="packages/sdk-go/${V}"             # module is at packages/sdk-go/
          git tag "$TAG" "$V"
          git push origin "$TAG"
