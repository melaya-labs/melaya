import com.vanniktech.maven.publish.SonatypeHost

plugins {
    id 'org.jetbrains.kotlin.jvm' version '2.2.20'
    id 'application'
    id 'com.vanniktech.maven.publish' version '0.30.0'
}
group = 'org.melaya'
version = '0.1.3'
repositories { mavenCentral() }
dependencies {
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'org.json:json:20240303'
}
application { mainClass = 'org.melaya.E2EKt' }
kotlin { jvmToolchain(21) }

// e2e smoke lives under e2e/ (separate source set; uses the main library output + deps)
sourceSets {
    e2e {
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}
kotlin.sourceSets.e2e.kotlin.srcDirs = ['e2e']
configurations {
    e2eImplementation.extendsFrom implementation
    e2eRuntimeOnly.extendsFrom runtimeOnly
}
tasks.named('run', JavaExec) {
    classpath = sourceSets.e2e.runtimeClasspath
    mainClass = 'org.melaya.E2EKt'
}

mavenPublishing {
    publishToMavenCentral(SonatypeHost.CENTRAL_PORTAL)
    signAllPublications()
    coordinates('org.melaya', 'melaya-sdk-kotlin', '0.1.3')
    pom {
        name = 'Melaya Kotlin'
        description = 'Official Kotlin SDK for the Melaya trading platform — market data, paper + live trading, backtesting, and streaming.'
        url = 'https://github.com/melaya-labs/melaya'
        licenses { license { name = 'Apache-2.0'; url = 'https://www.apache.org/licenses/LICENSE-2.0' } }
        developers { developer { id = 'melaya-labs'; name = 'Melaya'; email = 'info@melaya.org' } }
        scm {
            url = 'https://github.com/melaya-labs/melaya'
            connection = 'scm:git:https://github.com/melaya-labs/melaya.git'
            developerConnection = 'scm:git:ssh://git@github.com/melaya-labs/melaya.git'
        }
    }
}
