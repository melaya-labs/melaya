plugins {
    id 'java'
    id 'application'
    id 'com.vanniktech.maven.publish' version '0.30.0'
}

group = 'org.melaya'
version = '0.1.1'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'
    implementation 'org.java-websocket:Java-WebSocket:1.5.6'
}

application {
    mainClass = 'org.melaya.E2E'
}

jar {
    manifest {
        attributes 'Main-Class': 'org.melaya.E2E'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// e2e smoke lives under e2e/ (separate source set; uses the main library output + deps)
sourceSets {
    e2e {
        java.srcDirs = ['e2e']
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}
configurations {
    e2eImplementation.extendsFrom implementation
    e2eRuntimeOnly.extendsFrom runtimeOnly
}
tasks.named('run', JavaExec) {
    classpath = sourceSets.e2e.runtimeClasspath
    mainClass = 'org.melaya.E2E'
}

mavenPublishing {
    publishToMavenCentral()
    signAllPublications()
    coordinates('org.melaya', 'melaya-sdk', '0.1.1')
    pom {
        name = 'Melaya Java'
        description = 'Official Java SDK for the Melaya trading platform — market data, paper + live trading, backtesting, and streaming.'
        url = 'https://github.com/melaya-labs/melaya'
        licenses { license { name = 'Apache-2.0'; url = 'https://www.apache.org/licenses/LICENSE-2.0' } }
        developers { developer { id = 'melaya-labs'; name = 'Melaya'; email = 'info@melaya.org' } }
        scm {
            url = 'https://github.com/melaya-labs/melaya'
            connection = 'scm:git:https://github.com/melaya-labs/melaya.git'
            developerConnection = 'scm:git:ssh://git@github.com/melaya-labs/melaya.git'
        }
    }
}
